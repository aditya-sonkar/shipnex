services:
  - type: web
    name: shipnex-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: "http://localhost:3000"  # Fallback, user can update in Render UI
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
